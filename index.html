<title>Dirt Inc.</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
  :root{
    --teal:#1D7A8A; --teal-dk:#14545E; --teal-grid:#2A8E9E;
    --yellow:#F2D33C; --yellow-dk:#C9A616;
    --lime:#7CFC5A; --red:#FF5A4A; --purple:#C77DFF;
    --hud:#101418; --paper:#F2EFE4;
  }
  *{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation;}
  html,body{height:100%;}
  body{
    background:#0B0D10;
    font-family:"Courier New",ui-monospace,Menlo,monospace;
    font-weight:bold;
    display:flex;align-items:center;justify-content:center;
    min-height:100dvh;padding:10px;color:var(--paper);
    touch-action:manipulation;-webkit-user-select:none;user-select:none;
  }
  #phone{
    position:relative;width:min(400px,100%);height:min(860px,100dvh - 20px);
    min-height:540px;background:#000;overflow:hidden;
    box-shadow:0 0 0 6px #000,0 0 0 8px #2E2E33,0 22px 55px #000C;
    border-radius:18px;display:flex;flex-direction:column;
  }
  /* HUD */
  #hud{background:var(--hud);padding:5px 8px 6px;z-index:5;border-bottom:3px solid #000;}
  #prog-wrap{display:flex;align-items:center;gap:6px;}
  #prog-bar{flex:1;height:10px;background:#26221C;border:2px solid #3B3428;position:relative;}
  #prog-fill{height:100%;width:0%;background:repeating-linear-gradient(90deg,#5FA843 0 6px,#4C8A34 6px 12px);}
  #prog-text{font-size:10px;color:#C8C2B0;white-space:nowrap;font-variant-numeric:tabular-nums;}
  #dirt-count{text-align:center;font-size:22px;color:#FFF;margin-top:3px;letter-spacing:.5px;
    font-variant-numeric:tabular-nums;text-shadow:2px 2px 0 #000;}
  /* SCENE */
  #scene-wrap{position:relative;flex:1;overflow:hidden;background:#000;}
  canvas{position:absolute;inset:0;width:100%;height:100%;image-rendering:pixelated;cursor:pointer;
    touch-action:none;-webkit-touch-callout:none;}
  #fx-layer{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
  .float{position:absolute;font-size:14px;color:var(--lime);text-shadow:1px 1px 0 #000;
    animation:rise 1.1s ease-out forwards;pointer-events:none;white-space:nowrap;font-weight:bold;}
  .float.special{color:var(--yellow);font-size:15px;}
  .float.bad{color:var(--red);}
  @keyframes rise{to{transform:translateY(-70px);opacity:0;}}
  @media (prefers-reduced-motion: reduce){.float{animation-duration:.5s;}}
  /* SIDE TABS */
  .side-tab{position:absolute;top:12%;width:30px;padding:12px 0;z-index:6;cursor:pointer;border:none;
    font-family:inherit;font-weight:bold;font-size:13px;letter-spacing:2px;color:#08343B;
    writing-mode:vertical-rl;text-orientation:upright;text-align:center;}
  #tab-menu{left:0;background:linear-gradient(90deg,#2FB3C7,#1D7A8A);border-radius:0 10px 10px 0;
    box-shadow:2px 2px 0 #08343B;}
  #tab-menu.glow{animation:tabglow 1s ease-in-out infinite;}
  @keyframes tabglow{0%,100%{box-shadow:2px 2px 0 #08343B;}50%{box-shadow:0 0 14px 4px #7CFC5A;}}
  #tab-upg{right:0;background:linear-gradient(-90deg,#FFE469,#F2D33C 60%,#C9A616);color:#4A3A05;
    border-radius:10px 0 0 10px;box-shadow:-2px 2px 0 #4A3A05;}
  #tab-energy{right:0;top:46%;background:linear-gradient(-90deg,#D9A0FF,#B15CE8);color:#3A0A55;
    border-radius:10px 0 0 10px;box-shadow:-2px 2px 0 #3A0A55;display:none;}
  /* TOASTS */
  #toasts{position:absolute;top:6px;left:0;right:0;z-index:9;display:flex;flex-direction:column;
    align-items:center;gap:4px;pointer-events:none;}
  .toast{background:#101418F0;border:2px solid var(--yellow);color:var(--yellow);font-size:11px;
    padding:6px 12px;max-width:90%;text-align:center;animation:toast 3.2s ease forwards;}
  @keyframes toast{0%{transform:translateY(-10px);opacity:0;}10%,82%{transform:none;opacity:1;}100%{opacity:0;}}
  /* PANELS */
  #panel{position:absolute;inset:0;z-index:20;display:none;flex-direction:column;
    background:
      linear-gradient(#0000 23px,#2A8E9E22 24px) 0 0/100% 24px,
      linear-gradient(90deg,#0000 23px,#2A8E9E22 24px) 0 0/24px 100%,
      linear-gradient(#186977,#14545E);
  }
  #panel.open{display:flex;}
  #panel-top{display:flex;align-items:center;gap:8px;padding:8px;}
  .ybtn{background:linear-gradient(#FFE469,#F2D33C 55%,#C9A616);color:#4A3A05;border:none;
    font-family:inherit;font-weight:bold;font-size:13px;padding:8px 16px;cursor:pointer;
    box-shadow:2px 2px 0 #4A3A05;border-radius:3px;}
  .ybtn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #4A3A05;}
  .ybtn:disabled{background:#8A8578;color:#4B473D;box-shadow:2px 2px 0 #333;cursor:default;}
  .ybtn.small{font-size:11px;padding:5px 10px;}
  #panel-title{flex:1;text-align:center;font-size:15px;color:#FFF;text-shadow:2px 2px 0 #08343B;
    letter-spacing:1px;}
  #panel-tabs{display:flex;gap:4px;padding:0 8px;flex-wrap:wrap;}
  #panel-tabs button{background:#0E434C;color:#9FD9E2;border:2px solid #0A343B;border-bottom:none;
    font-family:inherit;font-weight:bold;font-size:10.5px;padding:6px 8px;cursor:pointer;}
  #panel-tabs button.on{background:var(--yellow);color:#4A3A05;}
  #panel-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;
    border-top:3px solid #0A343B;}
  .btn-grid{display:flex;flex-direction:column;gap:10px;padding:18px 22px;}
  .btn-grid .ybtn{font-size:15px;padding:14px;}
  .upg-row{display:flex;gap:8px;background:#0E434CE0;border:2px solid #0A343B;padding:8px;align-items:center;}
  .upg-cost{flex:none;width:92px;text-align:center;font-size:12px;line-height:1.3;
    font-variant-numeric:tabular-nums;}
  .upg-cost.can{color:var(--lime);} .upg-cost.cant{color:var(--red);}
  .upg-desc{flex:1;font-size:11.5px;color:#EAF6F8;line-height:1.35;}
  .upg-desc .lvl{color:var(--yellow);font-size:10px;}
  .upg-desc .sub{display:block;color:#9FD9E2;font-size:10px;}
  .upg-buy{flex:none;}
  .qtimer{height:6px;background:#08343B;margin-top:4px;}
  .qtimer div{height:100%;background:var(--lime);}
  .center-note{font-size:11px;color:#C9E8ED;text-align:center;line-height:1.5;padding:8px;}
  .prestige-text{font-size:13px;line-height:1.6;padding:14px 18px;text-align:center;}
  .prestige-text .w{color:#FFF;} .prestige-text .g{color:var(--lime);} .prestige-text .t{color:#5FE3F5;}
  .ach-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;}
  .ach-cell{aspect-ratio:1;background:#0E434C;border:2px solid #0A343B;display:flex;flex-direction:column;
    align-items:center;justify-content:center;font-size:9px;color:#6FA9B2;cursor:pointer;text-align:center;gap:2px;}
  .ach-cell.got{background:#1E6E32;border-color:#7CFC5A;color:#D8FFC8;}
  .ach-cell .n{font-size:13px;}
  .item-row{display:flex;gap:8px;background:#0E434CE0;border:2px solid #0A343B;padding:7px;align-items:center;
    cursor:pointer;}
  .item-row.equipped{border-color:var(--lime);}
  .item-row.selling{border-color:var(--red);background:#5A1E16E0;}
  .item-name{flex:1;font-size:11.5px;line-height:1.3;}
  .item-name .bonus{display:block;font-size:10px;color:#9FD9E2;}
  .r0{color:#FFFFFF;} .r1{color:#7CFC5A;} .r2{color:#5FA8FF;} .r3{color:#C77DFF;} .r4{color:#F2D33C;} .r5{color:#FF5A4A;}
  .contract-card{background:#0E434CE0;border:2px solid #0A343B;padding:9px;}
  .contract-card .cname{color:var(--yellow);font-size:12.5px;}
  .contract-card .cgoal{color:#EAF6F8;font-size:11px;margin-top:3px;}
  .contract-card .cprog{color:var(--lime);font-size:10.5px;margin-top:2px;font-variant-numeric:tabular-nums;}
  .contract-card .crew{color:#9FD9E2;font-size:10.5px;}
  .stat-list{font-size:11.5px;line-height:2;padding:6px 10px;font-variant-numeric:tabular-nums;}
  .stat-list b{color:var(--yellow);float:right;}
  .energy-row{display:flex;gap:8px;background:#2A0E4CE0;border:2px solid #1A0A33;padding:8px;align-items:center;}
  .energy-cost{flex:none;width:70px;text-align:center;color:var(--purple);font-size:13px;}
  #crate-reveal{text-align:center;padding:20px;font-size:13px;line-height:1.8;}
  .hint-block{font-size:11px;line-height:1.7;color:#EAF6F8;padding:4px 8px;}
  .hint-block h4{color:var(--yellow);margin:8px 0 2px;font-size:12px;}
  .lb-input{flex:1;min-width:0;background:#0E434C;border:2px solid #0A343B;color:#FFF;
    font-family:inherit;font-weight:bold;font-size:13px;padding:8px;-webkit-user-select:text;user-select:text;}
  .lb-row{display:flex;gap:8px;background:#0E434CE0;border:2px solid #0A343B;padding:7px 10px;
    font-size:12px;align-items:center;}
  .lb-row .rank{flex:none;width:28px;color:var(--yellow);}
  .lb-row .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lb-row .sc{flex:none;color:var(--lime);font-variant-numeric:tabular-nums;}
  .lb-row.me{border-color:var(--lime);}
</style>

<div id="phone">
  <div id="hud">
    <div id="prog-wrap">
      <div id="prog-bar"><div id="prog-fill"></div></div>
      <span id="prog-text">0 / 1b</span>
    </div>
    <div id="dirt-count">0 Dirt</div>
  </div>
  <div id="scene-wrap">
    <canvas id="cv" width="320" height="480"></canvas>
    <div id="fx-layer"></div>
    <button id="tab-menu" class="side-tab">MENU</button>
    <button id="tab-upg" class="side-tab">UPGRADES</button>
    <button id="tab-energy" class="side-tab">ENERGY</button>
    <div id="toasts"></div>
    <div id="panel">
      <div id="panel-top">
        <button id="panel-back" class="ybtn">Back</button>
        <span id="panel-title"></span>
        <button id="panel-close" class="ybtn">Close</button>
      </div>
      <div id="panel-tabs"></div>
      <div id="panel-body"></div>
    </div>
  </div>
</div>

<script>
"use strict";
/* =================== NUMBER FORMAT (original suffix table) =================== */
const SUF=[[1e33,"d"],[1e30,"n"],[1e27,"oct"],[1e24,"spt"],[1e21,"s"],[1e18,"qnt"],[1e15,"q"],[1e12,"t"],[1e9,"b"],[1e6,"m"]];
function fmt(n){
  if(!isFinite(n))return"MAX";
  if(n<0)return"-"+fmt(-n);
  for(const [v,s] of SUF){if(n>=v)return trim(n/v)+s;}
  if(n>=1000)return Math.floor(n).toLocaleString("en-US");
  return trim(n);
}
function trim(v){return (Math.round(v*100)/100).toString();}
function fmtInt(n){return Math.round(n).toLocaleString("en-US");}

/* =================== SPECIAL BLOCK TABLE (from original: coal 2x, copper 4x, silver 6x, gold 11x, diamond 100x) */
const SPECIALS={
  coal:{mult:2,name:"Coal",color:"#33332F"},
  copper:{mult:4,name:"Copper",color:"#C4753A"},
  silver:{mult:6,name:"Silver",color:"#C9CDD4"},
  gold:{mult:11,name:"Gold",color:"#F2C230"},
  diamond:{mult:100,name:"Diamond",color:"#5FE3F5"},
};
/* worlds unlocked by total mined dirt; headlines match the originals' news events */
const WORLDS=[
  {name:"Topsoil",goal:1e9,
   day:["#8ED0EC","#C9EAF7"],night:["#0B1030","#1B2450"],grass:"#5FA843",
   dirtA:[138,82,38],dirtB:[176,112,58],stone:"#6E6E6E",headline:null},
  {name:"Undersea",goal:5e10,
   day:["#2E7FB8","#7FC4E8"],night:["#0A2038","#123050"],grass:"#3A8F8A",
   dirtA:[70,84,60],dirtB:[95,110,75],stone:"#4E6E7E",headline:"World Powers Fight for Undersea Minerals!"},
  {name:"The Moon",goal:2.5e12,
   day:["#0B0E1C","#232946"],night:["#05060F","#141830"],grass:"#9AA0B2",
   dirtA:[110,114,128],dirtB:[140,144,158],stone:"#55596A",headline:"Minerals Found On the Moon!"},
  {name:"The Sun",goal:1e14,
   day:["#B83A1E","#F2A03C"],night:["#5A1A0E","#8C3A1E"],grass:"#E8C93C",
   dirtA:[160,80,30],dirtB:[195,110,40],stone:"#7E4E2E",headline:"World Demand for Sun Minerals at all Time High!"},
  {name:"Dirt Dimension",goal:Infinity,
   day:["#3A1E55","#6E3A8C"],night:["#1E0E33","#3A1E55"],grass:"#8C5AE8",
   dirtA:[90,50,90],dirtB:[120,70,115],stone:"#5A3A6E",headline:"Portal Opened to Dirt Dimension, Worker Proclaimed King!"},
];
/* item system: 5 slots, 6 rarities (white green blue purple yellow red), prefixes from the original */
const RARITY=[
  {tag:"Basic",  cls:"r0",w:45},
  {tag:"Worn",   cls:"r1",w:26},
  {tag:"Solid",  cls:"r2",w:15},
  {tag:"Rare",   cls:"r3",w:8},
  {tag:"Attuned",cls:"r4",w:4.5},
  {tag:"",       cls:"r5",w:1.5},
];
const SLOTS={
  tool:  {label:"Tool",  vals:[2,5,10,18,30,50],  desc:v=>"+"+v+"% tapped dirt"},
  helmet:{label:"Helmet",vals:[.2,.5,1,1.8,3,5],  desc:v=>"+"+v+"% chance of diamond or gnome blocks"},
  gloves:{label:"Gloves",vals:[5,10,20,35,55,90], desc:v=>"+"+v+"% generator boost time"},
  boots: {label:"Boots", vals:[3,7,13,22,38,60],  desc:v=>"+"+v+"% auto-digger speed"},
  jacket:{label:"Jacket",vals:[2,5,9,15,25,40],   desc:v=>"Quarry mining times reduced by "+v+"%"},
};
const SLOT_KEYS=Object.keys(SLOTS);
/* quarry: the original's 6 mines */
const QUARRY=[
  {key:"dirt",   name:"Dirt Mine",   amt:6,    time:10, cost:5e3},
  {key:"coal",   name:"Coal Mine",   amt:35,   time:15, cost:6e4},
  {key:"copper", name:"Copper Mine", amt:170,  time:20, cost:7e5},
  {key:"silver", name:"Silver Mine", amt:900,  time:25, cost:8e6},
  {key:"gold",   name:"Gold Mine",   amt:5200, time:30, cost:1e8},
  {key:"diamond",name:"Diamond Mine",amt:30000,time:40, cost:1.5e9},
];
/* research lab: the original's 8 one-time researches */
const RESEARCH=[
  {id:"tap",  name:"Tap Research",      desc:"Tapped dirt is doubled.",                         cost:2e5},
  {id:"dig",  name:"Digger Research",   desc:"The auto-digger digs twice the blocks.",          cost:1.5e6},
  {id:"mine", name:"Mine Research",     desc:"All quarry mines produce double dirt.",           cost:1e7},
  {id:"block",name:"Block Research",    desc:"Special blocks are worth double.",                cost:5e7},
  {id:"gen",  name:"Generator Research",desc:"The generator charges twice as fast.",            cost:2.5e8},
  {id:"gnome",name:"Gnome Research",    desc:"Gnomes deliver double dirt.",                     cost:1e9},
  {id:"price",name:"Price Research",    desc:"All upgrades cost 10% less.",                     cost:5e9},
  {id:"energy",name:"Energy Research",  desc:"Unlocks the Energy Block. Dig it for +50 energy.",cost:2.5e10},
];
/* energy events: the original's 4 */
const EVENTS=[
  {id:"taplord",name:"Tap Lord",    cost:250,desc:"Tapped dirt x10 for 30s."},
  {id:"hyperq", name:"Hyper Quarry",cost:400,desc:"Quarry mines produce x10 for 30s."},
  {id:"laser",  name:"Laser Drill", cost:600,desc:"Instantly drills through 20 blocks."},
  {id:"pgnome", name:"Power Gnome", cost:900,desc:"Summons 10 gnomes at once."},
];
/* achievements: original categories and targets */
const ACH=[
  {cat:"Dirt Collection",stat:"lifetime",targets:[1e4,1e6,1e12,1e21,1e33,1e63],
   fmtT:t=>fmt(t)+" dirt",desc:"Collect {T} total dirt"},
  {cat:"Block Destroyer",stat:"blocks",targets:[100,1e3,1e4,1e5,1e6,1e7],
   fmtT:t=>fmtInt(t),desc:"Mine {T} overall blocks"},
  {cat:"Upgrader",stat:"upgrades",targets:[10,100,300,700,1200,2000],
   fmtT:t=>fmtInt(t),desc:"Purchase {T} upgrades"},
  {cat:"Looter",stat:"crates",targets:[5,50,175,350,700,2000],
   fmtT:t=>fmtInt(t),desc:"Collect {T} overall crates"},
  {cat:"Contractor",stat:"contracts",targets:[3,15,50,300,700,2000],
   fmtT:t=>fmtInt(t),desc:"Complete {T} overall contracts"},
  {cat:"Collector",stat:"bestRarity",targets:[1,2,3,4,5,6],
   fmtT:t=>["a white","a green","a blue","a purple","a yellow","a red"][t-1]+" item",desc:"Collect {T} equippable item"},
  {cat:"Excavator",stat:"minQuarry",targets:[1,10,50,125,275,500],
   fmtT:t=>"level "+fmtInt(t),desc:"Upgrade all quarries to {T}"},
];
/* contracts: original types */
const CONTRACT_TYPES=[
  {id:"blocks", name:"Block Destroyer",   goal:c=>Math.ceil(30*Math.pow(2,c)),        desc:(t)=>"Mine "+fmt(t)+" blocks"},
  {id:"mainup", name:"Worker",            goal:c=>Math.ceil(2+c*2),                   desc:(t)=>"Buy "+t+" main screen upgrades"},
  {id:"pctup",  name:"A little off the top",goal:c=>Math.ceil(2+c*2),                 desc:(t)=>"Buy "+t+" percentage upgrades"},
  {id:"quarryup",name:"Too Deep",         goal:c=>Math.ceil(3+c*3),                   desc:(t)=>"Buy "+t+" quarry upgrades"},
  {id:"crates", name:"Hoarder",           goal:c=>Math.ceil(1+c),                     desc:(t)=>"Collect "+t+" crates"},
  {id:"cycles", name:"Day and Night",     goal:c=>Math.ceil(1+c*0.5),                 desc:(t)=>"Work "+t+" day and night cycles"},
  {id:"gnomes", name:"Workforce",         goal:c=>Math.ceil(2+c*1.5),                 desc:(t)=>"Spawn "+t+" gnomes"},
  {id:"taps",   name:"Who needs fingers", goal:c=>Math.ceil(100*Math.pow(1.8,c)),     desc:(t)=>"Tap "+fmt(t)+" times"},
];

/* =================== STATE =================== */
function freshRun(){
  return {
    dirt:0, lifetime:0,
    baseDirt:1,
    tapLvl:0, digLvl:0, motorLvl:0, refLvl:0, foreLvl:0, gnomeLvl:0,
    pct:{tap:0,dig:0,quarry:0,ref:0,all:0},
    quarry:QUARRY.map(()=>0), qTimers:QUARRY.map(()=>0),
    research:{},
    generator:0, genCharge:0, boostUntil:0,
    energyTap:false, energy:0, evUntil:{}, evFreeAt:{},
    crateCount:0, items:{}, equipped:{},
    contracts:[], rerolls:3,
    stats:{blocks:0,taps:0,upgrades:0,crates:0,contracts:0,gnomes:0,cycles:0,bestRarity:0,
      specials:{coal:0,copper:0,silver:0,gold:0,diamond:0}},
    achGot:{},
    world:0, row:0, col:0, dir:1, tapsOnBlock:0, depth:0,
    dayT:0,
    lastSeen:Date.now(),
  };
}
let S=freshRun();
let META={prestiges:0,prestigeBonus:0,allLifetime:0,allBlocks:0};
try{
  const s=localStorage.getItem("dirt-inc-v2"); if(s){const l=JSON.parse(s);
    S={...freshRun(),...l,pct:{...freshRun().pct,...l.pct},stats:{...freshRun().stats,...l.stats,specials:{...freshRun().stats.specials,...(l.stats&&l.stats.specials||{})}}};
    if(!Array.isArray(S.quarry)||S.quarry.length!==QUARRY.length)S.quarry=QUARRY.map(()=>0);
    if(!Array.isArray(S.qTimers)||S.qTimers.length!==QUARRY.length)S.qTimers=QUARRY.map(()=>0);}
  const m=localStorage.getItem("dirt-inc-v2-meta"); if(m)META={...META,...JSON.parse(m)};
}catch(e){}
S.baseDirt=1+META.prestigeBonus;

/* =================== ECON =================== */
const hasR=id=>!!S.research[id];
const priceMod=()=>hasR("price")?0.9:1;
function itemBonus(slot){
  const it=S.equipped[slot];
  return it?SLOTS[slot].vals[it.r]:0;
}
function pctMult(k){return (1+S.pct[k]*0.02)*(1+S.pct.all*0.02);}
function blockValue(){ /* value of one plain dirt block */
  let v=(S.baseDirt+S.refLvl)*pctMult("ref");
  if(S.boostUntil>now()&&S.generator>=3)v*=2; /* Refinery Boost */
  return v;
}
function tapMult(){
  let m=pctMult("tap")*(1+itemBonus("tool")/100)*(hasR("tap")?2:1);
  if(S.evUntil.taplord>now())m*=10;
  if(S.boostUntil>now()&&S.generator>=4)m*=2; /* Dirt Pile Boost */
  return m;
}
function tapsNeeded(){return Math.max(1,3-Math.min(S.tapLvl,2));}
function blocksPerTap(){return 1+Math.max(0,S.tapLvl-2);}
function diggerInterval(){
  if(S.digLvl<1)return Infinity;
  let base=4*Math.pow(0.72,Math.floor(S.digLvl/2)); /* every even level: ~28% faster */
  base/=(1+S.motorLvl*0.08);
  base/=(1+itemBonus("boots")/100);
  if(S.boostUntil>now())base/=2;
  return Math.max(0.25,base);
}
function diggerBlocks(){
  if(S.digLvl<1)return 0;
  return (1+Math.floor((S.digLvl-1)/2))*(hasR("dig")?2:1); /* every odd level 3+: +1 block */
}
function specialChance(){
  /* starts sparse like the original; upgrades slowly turn the whole field to ore */
  let c=0.02+S.foreLvl*0.01+(S.gnomeLvl>0?Math.floor(S.gnomeLvl/2)*0.01:0);
  if(S.boostUntil>now()&&S.generator>=2)c*=2; /* Foreman Boost */
  return Math.min(0.85,c);
}
function quarryRate(i){ /* dirt per second for display */
  if(S.quarry[i]<1)return 0;
  return QUARRY[i].amt*S.quarry[i]/quarryTime(i)*quarryMult();
}
function quarryMult(){
  let m=pctMult("quarry")*(hasR("mine")?2:1);
  if(S.evUntil.hyperq>now())m*=10;
  return m;
}
function quarryTime(i){return QUARRY[i].time*(1-itemBonus("jacket")/100);}
/* costs */
const tapCost=()=>Math.round((S.tapLvl===0?100:S.tapLvl===1?2500:5e4*Math.pow(40,S.tapLvl-2))*priceMod());
const digCost=()=>Math.round(400*Math.pow(4,S.digLvl)*priceMod());
const motorCost=()=>Math.round(1200*Math.pow(1.8,S.motorLvl)*priceMod());
const refCost=()=>Math.round(1000*Math.pow(7,S.refLvl)*priceMod());
const foreCost=()=>Math.round(2500*Math.pow(5,S.foreLvl)*priceMod());
const gnomeCost=()=>Math.round(15000*Math.pow(6,S.gnomeLvl)*priceMod());
const pctCost=k=>{
  const base={tap:1000,dig:2000,quarry:3000,ref:4000,all:10000}[k];
  const g=k==="all"?2.3:1.9;
  return Math.round(base*Math.pow(g,S.pct[k])*priceMod());
};
const quarryCost=i=>Math.round(QUARRY[i].cost*Math.pow(1.35,S.quarry[i])*priceMod());
const GEN_TIERS=[
  {name:"Build the Generator",cost:5e7, desc:"Charges over time. When full, tap the glowing digger to boost auto-digging x2 for 30s."},
  {name:"Foreman Boost",cost:2e8, desc:"The boost also doubles special block chance."},
  {name:"Refinery Boost",cost:5e8, desc:"The boost also doubles block value."},
  {name:"Dirt Pile Boost",cost:1e9,desc:"The boost also doubles tapped dirt."},
];
const ENERGY_TAP_COST=2.5e8;
function now(){return Date.now();}

function earnDirt(n){S.dirt+=n;S.lifetime+=n;META.allLifetime+=n;}
function spend(n){if(S.dirt<n)return false;S.dirt-=n;return true;}

}

/* =================== BLOCK FIELD =================== */
const COLS=16,ROWS=21,BS=20;   /* dense field like the original: 16x21 = 336 blocks per layer */
const LW=320,LH=480,SURFACE=60;
let rows=[];                    /* rows[r][c] = block object */
let flashT=0;                   /* layer-clear flash */
function hash(n){let x=Math.sin(n*127.1+S.depth*311.7)*43758.5453;return x-Math.floor(x);}
function makeRow(depthIdx){
  const r=[];
  for(let c=0;c<COLS;c++){
    let type="dirt";
    const roll=Math.random();
    const sc=specialChance();
    const helm=itemBonus("helmet")/100;
    if(roll<sc){
      const p=Math.random();
      if(p<0.50)type="coal";
      else if(p<0.72)type="copper";
      else if(p<0.85)type="silver";
      else if(p<0.95)type="gold";
      else type="diamond";
    }else if(roll<sc+0.012+helm){type="gnome";}
    else if(roll<sc+0.012+helm+(hasR("energy")?0.008:0)){type="energy";}
    if(Math.random()<(0.004+helm*0.1))type="crate";
    r.push({type,dug:false,seed:Math.random()*1e4|0});
  }
  return r;
}
function initField(){
  rows=[];for(let i=0;i<ROWS;i++)rows.push(makeRow(i));
}
initField();
/* restore mid-layer progress from the save: everything behind the miner is already dug */
S.row=Math.max(0,Math.min(ROWS-1,S.row|0));
S.col=Math.max(0,Math.min(COLS-1,S.col|0));
for(let r=0;r<S.row;r++)for(const b of rows[r])b.dug=true;
if(rows[S.row]){
  if(S.dir>0){for(let c=0;c<S.col;c++)rows[S.row][c].dug=true;}
  else{for(let c=COLS-1;c>S.col;c--)rows[S.row][c].dug=true;}
}

function currentBlock(){return rows[S.row]&&rows[S.row][S.col];}
function layerCleared(){
  S.depth++;
  const bonus=blockValue()*COLS*ROWS*0.3*(1+S.depth*0.08);
  earnDirt(bonus);
  flashT=1;
  toast("LAYER "+fmtInt(S.depth)+" CLEARED! +"+fmt(bonus)+" bonus dirt!");
  S.row=0;S.col=0;S.dir=1;
  initField();
}
function advance(){
  S.tapsOnBlock=0;
  S.col+=S.dir;
  if(S.col>=COLS||S.col<0){
    S.col=Math.max(0,Math.min(COLS-1,S.col));
    S.dir*=-1;
    S.row++;
    if(S.row>=ROWS)layerCleared();
  }
}
function digBlock(byTap,silent){
  const b=currentBlock();if(!b)return 0;
  b.dug=true;
  S.stats.blocks++;META.allBlocks++;
  bumpContract("blocks");
  let val=blockValue();
  let label=null;
  if(SPECIALS[b.type]){
    val*=SPECIALS[b.type].mult*(hasR("block")?2:1);
    S.stats.specials[b.type]++;
    label=SPECIALS[b.type].name+"!";
  }
  if(b.type==="gnome"){spawnGnome();val=0;}
  else if(b.type==="crate"){S.crateCount++;S.stats.crates++;bumpContract("crates");toast("You found an item crate!");val=blockValue();}
  else if(b.type==="energy"){S.energy=Math.min(1000,S.energy+50);val=0;if(!silent)floatText("+50 Energy",gx(S.col),gy(S.row),"special");}
  if(val>0){
    val*=byTap?tapMult():pctMult("dig");
    earnDirt(val);
    if(!silent)floatText("+"+fmt(val),gx(S.col),gy(S.row),label?"special":"");
    if(label&&!silent)floatText(label,gx(S.col),gy(S.row)-16,"special");
  }
  advance();
  return val;
}
function gx(c){return c*BS+BS/2;}
function gy(r){return SURFACE+r*BS+BS/2;}

/* gnomes */
let gnomes=[];
function spawnGnome(){
  S.stats.gnomes++;bumpContract("gnomes");
  gnomes.push({x:-10,t:0});
  if(gnomes.length>6)gnomes.shift();
  let val=0;
  const gBoost=(1+(S.gnomeLvl))*(hasR("gnome")?2:1);
  for(let i=0;i<5;i++){
    let m=1;const p=Math.random();
    if(p<0.5)m=1;else if(p<0.7)m=2;else if(p<0.85)m=4;else if(p<0.93)m=6;else if(p<0.99)m=11;else m=100;
    val+=blockValue()*m;
  }
  val*=gBoost;
  earnDirt(val);
  toast("A gnome delivered "+fmt(val)+" dirt!");
}

/* =================== TAP INPUT =================== */
const cv=document.getElementById("cv");
const ctx=cv.getContext("2d");
let guyFrame=0,guyAnim=0;
function handleTap(px,py){
  /* tapping the glowing digger on the surface activates the generator boost */
  if(S.generator>0&&S.genCharge>=100&&py<SURFACE/LH){
    S.genCharge=0;S.boostUntil=now()+30000*(1+itemBonus("gloves")/100);
    toast("Boost Active!");return;
  }
  S.stats.taps++;bumpContract("taps");
  S.tapsOnBlock++;guyAnim=6;
  if(S.tapsOnBlock>=tapsNeeded()){
    const extra=blocksPerTap();
    for(let i=0;i<extra;i++)digBlock(true,i>2);
  }
  renderHud();
}
cv.addEventListener("pointerdown",e=>{
  e.preventDefault();
  const r=cv.getBoundingClientRect();
  handleTap((e.clientX-r.left)/r.width,(e.clientY-r.top)/r.height);
});
/* kill mobile double-tap / pinch zoom glitches */
cv.addEventListener("touchend",e=>e.preventDefault(),{passive:false});
document.addEventListener("dblclick",e=>e.preventDefault(),{passive:false});
document.addEventListener("gesturestart",e=>e.preventDefault());
addEventListener("keydown",e=>{
  if((e.key===" "||e.key==="Enter")&&!panelOpen){e.preventDefault();handleTap(0.5,0.6);}
});

/* =================== CONTRACTS =================== */
function newContract(){
  const t=CONTRACT_TYPES[Math.floor(Math.random()*CONTRACT_TYPES.length)];
  const c=S.stats.contracts;
  const goal=t.goal(Math.min(c,14));
  return {id:t.id,goal,prog:0,crates:1+Math.floor(Math.random()*2),dirt:Math.round(blockValue()*60+quarryTotal()*45+200)};
}
function quarryTotal(){let s=0;for(let i=0;i<QUARRY.length;i++)s+=quarryRate(i);return s;}
function ensureContracts(){while(S.contracts.length<3)S.contracts.push(newContract());}
ensureContracts();
function bumpContract(kind,amt){
  amt=amt||1;
  for(const c of S.contracts){
    if(c.done)continue;
    if(c.id===kind)c.prog+=amt;
    else if(kind==="anyup"&&0)c.prog+=0;
    if(c.prog>=c.goal&&!c.done){c.done=true;toast("Contract Complete!");document.getElementById("tab-menu").classList.add("glow");}
  }
}
/* upgrade kinds map to contract ids */
function upgradeBump(kind){
  if(kind==="main")bumpContract("mainup");
  if(kind==="pct")bumpContract("pctup");
  if(kind==="quarry")bumpContract("quarryup");
}

/* =================== ITEMS / CRATES =================== */
function rollItem(){
  const slot=SLOT_KEYS[Math.floor(Math.random()*SLOT_KEYS.length)];
  let total=RARITY.reduce((a,r)=>a+r.w,0),roll=Math.random()*total,r=0;
  for(let i=0;i<RARITY.length;i++){roll-=RARITY[i].w;if(roll<=0){r=i;break;}}
  const set=r===5?(Math.random()<0.5?"of Digging":"of Production"):null;
  const it={slot,r,set,id:Math.random().toString(36).slice(2,9)};
  if(!S.items[slot])S.items[slot]=[];
  S.items[slot].push(it);
  S.stats.bestRarity=Math.max(S.stats.bestRarity,r+1);
  return it;
}
function itemName(it){
  const base=SLOTS[it.slot].label;
  return it.r===5?base+" "+it.set:RARITY[it.r].tag+" "+base;
}
function redSetCount(setName){
  let n=0;
  for(const k of SLOT_KEYS){const eq=S.equipped[k];if(eq&&eq.r===5&&eq.set===setName)n++;}
  return n;
}

/* =================== ACHIEVEMENTS =================== */
function achStatValue(a){
  if(a.stat==="lifetime")return S.lifetime;
  if(a.stat==="minQuarry")return Math.min(...S.quarry);
  return S.stats[a.stat]||0;
}
function checkAch(){
  ACH.forEach((a,ci)=>{
    a.targets.forEach((t,ti)=>{
      const key=ci+"-"+ti;
      if(!S.achGot[key]&&achStatValue(a)>=t){
        S.achGot[key]=true;
        S.crateCount+=1+Math.floor(ti/2);S.stats.crates+=1+Math.floor(ti/2);
        toast("Tier "+(ti+1)+" "+a.cat+"! Crates awarded!");
      }
    });
  });
}

/* =================== PRESTIGE =================== */
function prestigeGain(){return Math.max(0,Math.floor(Math.sqrt(S.lifetime/1e6)*8)/10);}
function doPrestige(){
  const g=prestigeGain();if(g<0.5)return;
  META.prestigeBonus+=g;META.prestiges++;
  saveMeta();
  S=freshRun();S.baseDirt=1+META.prestigeBonus;
  initField();gnomes=[];ensureContracts();
  applyWorld();save();
  toast("Prestige! +"+g+" base dirt!");
  closePanel();renderHud();
}

/* panel click handling */
pBody.addEventListener("click",e=>{
  const nav=e.target.closest("[data-nav]");
  if(nav){openScreen(nav.dataset.nav);return;}
  if(e.target.closest("[data-close]")){closePanel();return;}
  const achEl=e.target.closest("[data-ach]");
  if(achEl){
    const [ci,ti]=achEl.dataset.ach.split("-").map(Number);
    const a=ACH[ci];
    toast("Tier "+(ti+1)+" "+a.cat+": "+a.desc.replace("{T}",a.fmtT(a.targets[ti]))+
      (S.achGot[achEl.dataset.ach]?" (Complete!)":" ("+fmt(Math.min(achStatValue(a),a.targets[ti]))+"/"+fmt(a.targets[ti])+")"));
    return;
  }
  const itEl=e.target.closest("[data-item]");
  if(itEl){
    const id=itEl.dataset.item,slot=screenArg||"tool";
    const it=(S.items[slot]||[]).find(x=>x.id===id);
    if(!it)return;
    if(sellMode){if(sellSel.has(id))sellSel.delete(id);else sellSel.add(id);}
    else{S.equipped[slot]=it;toast("Equipped "+itemName(it)+"!");}
    renderScreen();return;
  }
  const btn=e.target.closest("[data-act]");
  if(!btn||btn.disabled)return;
  const act=btn.dataset.act;
  doAction(act);
});
pTabs.addEventListener("click",e=>{
  const u=e.target.closest("[data-utab]");if(u){screenArg=u.dataset.utab;renderScreen();return;}
  const it=e.target.closest("[data-itab]");if(it){screenArg=it.dataset.itab;sellSel=new Set();renderScreen();return;}
});

let wipeArmed=false,lastCrateReveal="";
function doAction(act){
  if(act==="up-tap"&&spend(tapCost())){S.tapLvl++;countUpgrade();upgradeBump("main");toast("Tapping upgraded!");}
  else if(act==="up-dig"&&spend(digCost())){S.digLvl++;countUpgrade();upgradeBump("main");toast(S.digLvl===1?"Auto-Miner built!":"Auto-Miner upgraded!");}
  else if(act==="up-motor"&&spend(motorCost())){S.motorLvl++;countUpgrade();upgradeBump("main");toast("Miner Motor upgraded!");}
  else if(act==="up-ref"&&spend(refCost())){S.refLvl++;countUpgrade();upgradeBump("main");toast("Refinery upgraded!");}
  else if(act==="up-fore"&&spend(foreCost())){S.foreLvl++;countUpgrade();upgradeBump("main");toast("Foreman upgraded! +1% Special Blocks");}
  else if(act==="up-gnome"&&spend(gnomeCost())){S.gnomeLvl++;countUpgrade();upgradeBump("main");toast("Gnomes upgraded!");}
  else if(act==="up-gen"&&S.generator<GEN_TIERS.length&&spend(Math.round(GEN_TIERS[S.generator].cost*priceMod()))){S.generator++;countUpgrade();upgradeBump("main");toast(S.generator===1?"Generator Built!":"Generator Upgraded!");}
  else if(act==="up-etap"&&!S.energyTap&&spend(Math.round(ENERGY_TAP_COST*priceMod()))){S.energyTap=true;countUpgrade();upgradeBump("main");document.getElementById("tab-energy").style.display="block";toast("Energy Tap built! Check the ENERGY tab.");}
  else if(act.startsWith("pct-")){const k=act.slice(4);if(spend(pctCost(k))){S.pct[k]++;countUpgrade();upgradeBump("pct");toast(({tap:"Tap",dig:"Digger",quarry:"Quarry",ref:"Refinery",all:"Overall"})[k]+" percent upgraded!");}}
  else if(act.startsWith("q-")){const i=+act.slice(2);if(spend(quarryCost(i))){S.quarry[i]++;countUpgrade();upgradeBump("quarry");toast(S.quarry[i]===1?QUARRY[i].name+" built!":QUARRY[i].name+" upgraded!");}}
  else if(act.startsWith("res-")){const id=act.slice(4);const r=RESEARCH.find(x=>x.id===id);
    if(r&&!hasR(id)&&spend(Math.round(r.cost*priceMod()))){S.research[id]=true;countUpgrade();
      toast(r.name.split(" ")[0]+" research complete!");}}
  else if(act==="open-crate"){
    if(S.crateCount<1){toast("Not enough crates!");return;}
    S.crateCount--;
    const it=rollItem();
    lastCrateReveal='You have found a <span class="'+RARITY[it.r].cls+'">'+itemName(it)+'</span>!<br><span style="font-size:11px;color:#9FD9E2">'+SLOTS[it.slot].desc(SLOTS[it.slot].vals[it.r])+'</span>';
    checkAch();
  }
  else if(act==="sellmode"){sellMode=!sellMode;sellSel=new Set();}
  else if(act==="sell-sel"){
    if(!sellSel.size){toast("No items selected!");return;}
    const slot=screenArg||"tool";let got=0;
    S.items[slot]=(S.items[slot]||[]).filter(it=>{
      if(sellSel.has(it.id)){
        if(S.equipped[slot]===it){toast("Cannot sell an equipped item!");return true;}
        got+=blockValue()*50*Math.pow(6,it.r);return false;
      }return true;
    });
    if(got>0){earnDirt(got);toast("Items sold for "+fmt(got)+" dirt!");}
    sellSel=new Set();sellMode=false;
  }
  else if(act.startsWith("ev-")){
    const id=act.slice(3);const ev=EVENTS.find(x=>x.id===id);
    if(!S.energyTap||S.energy<ev.cost)return;
    S.energy-=ev.cost;fireEvent(id);
  }
  else if(act.startsWith("claim-")){
    const i=+act.slice(6);const c=S.contracts[i];
    if(!c||!c.done)return;
    S.crateCount+=c.crates;S.stats.crates+=c.crates;bumpContract("crates",c.crates);
    earnDirt(c.dirt);S.stats.contracts++;
    S.contracts.splice(i,1);ensureContracts();
    if(!S.contracts.some(x=>x.done))document.getElementById("tab-menu").classList.remove("glow");
    toast("Contract reward claimed!");checkAch();
  }
  else if(act.startsWith("reroll-")){
    const i=+act.slice(7);
    if(S.rerolls<1)return;S.rerolls--;
    S.contracts[i]=newContract();toast("Contract Re-rolled! "+S.rerolls+" re-rolls remaining");
  }
  else if(act==="lb-save"){
    const inp=document.getElementById("lb-name");
    const name=(inp?inp.value:"").replace(/[^\w \-]/g,"").trim().slice(0,14);
    if(!name){toast("Enter a name first!");return;}
    META.playerName=name;saveMeta();
    toast("Name saved! Submitting your score...");
    lbRefresh();
  }
  else if(act==="prestige"){doPrestige();return;}
  else if(act==="erase"){
    if(!wipeArmed){wipeArmed=true;setTimeout(()=>{wipeArmed=false;if(screen==="settings")renderScreen();},3000);renderScreen();return;}
    wipeArmed=false;
    localStorage.removeItem("dirt-inc-v2");localStorage.removeItem("dirt-inc-v2-meta");
    META={prestiges:0,prestigeBonus:0,allLifetime:0,allBlocks:0};
    S=freshRun();initField();gnomes=[];ensureContracts();applyWorld();
    document.getElementById("tab-energy").style.display="none";
    toast("Save erased. Welcome to Dirt Inc!");
  }
  checkAch();renderHud();renderScreen();
}
function fireEvent(id){
  if(id==="laser"){
    let total=0;
    for(let i=0;i<20;i++)total+=digBlock(false,true);
    toast("Laser Drill! Drilled 20 blocks for "+fmt(total)+" dirt!");
  }else if(id==="pgnome"){
    for(let i=0;i<10;i++)spawnGnome();
  }else{
    S.evUntil[id]=now()+30000;
    toast(EVENTS.find(x=>x.id===id).name+" active!");
  }
}

/* =================== RENDERING (pixel scene) =================== */
function lerpC(a,b,t){return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];}
function hex(c){return "rgb("+(c[0]|0)+","+(c[1]|0)+","+(c[2]|0)+")";}
function hx2rgb(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
const DAY_LEN=150; /* seconds per full day+night cycle */
function skyBlend(){
  const t=(S.dayT%DAY_LEN)/DAY_LEN; /* 0-0.5 day, 0.5-1 night */
  if(t<0.42)return {n:0,t};
  if(t<0.5)return {n:(t-0.42)/0.08,t};
  if(t<0.92)return {n:1,t};
  return {n:1-(t-0.92)/0.08,t};
}
function px(x,y,w,h,col){ctx.fillStyle=col;ctx.fillRect(x|0,y|0,w,h);}
function seededNoise(seed,i){let x=Math.sin(seed*12.9898+i*78.233)*43758.5453;return x-Math.floor(x);}

function drawBlock(x,y,b,w){
  if(b.dug){ /* dug-out hollow */
    px(x,y,BS,BS,"rgba(20,12,6,0.9)");
    for(let i=0;i<2;i++){
      const n=seededNoise(b.seed,i);
      px(x+2+n*14,y+3+seededNoise(b.seed,i+9)*13,2,2,"#3A2A1A");
    }
    return;
  }
  const A=w.dirtA,B=w.dirtB;
  /* mottled dirt: 4x4 subcells, chunky like the original */
  for(let sy=0;sy<4;sy++)for(let sx=0;sx<4;sx++){
    const n=seededNoise(b.seed,sx+sy*4);
    ctx.fillStyle=hex(lerpC(A,B,n));
    ctx.fillRect(x+sx*5,y+sy*5,5,5);
  }
  for(let i=0;i<3;i++){
    const n1=seededNoise(b.seed,20+i),n2=seededNoise(b.seed,30+i);
    ctx.fillStyle=n1>0.5?"rgba(0,0,0,0.22)":"rgba(255,255,255,0.10)";
    ctx.fillRect(x+2+(n1*15|0),y+2+(n2*15|0),2,2);
  }
  /* block seams */
  px(x,y,BS,1,"rgba(255,255,255,0.12)");
  px(x,y,1,BS,"rgba(0,0,0,0.18)");
  px(x,y+BS-1,BS,1,"rgba(0,0,0,0.30)");
  px(x+BS-1,y,1,BS,"rgba(0,0,0,0.25)");
  /* special sprite */
  const t=b.type;
  if(t!=="dirt"){
    if(SPECIALS[t]){
      const c=SPECIALS[t].color;
      px(x+4,y+5,4,4,c);px(x+11,y+3,3,3,c);px(x+8,y+12,4,3,c);px(x+14,y+10,3,3,c);px(x+3,y+14,3,3,c);
      if(t==="diamond")px(x+9,y+7,2,2,"#B9F5FC");
    }else if(t==="gnome"){
      px(x+7,y+3,6,4,"#E03A3A");px(x+6,y+7,8,5,"#F2C9A0");px(x+6,y+12,8,5,"#3A6EC2");
    }else if(t==="crate"){
      px(x+3,y+4,14,12,"#8A5A2B");px(x+3,y+4,14,2,"#B98A4B");px(x+3,y+9,14,2,"#5C3A18");px(x+9,y+4,2,12,"#5C3A18");
    }else if(t==="energy"){
      px(x+9,y+3,4,6,"#C77DFF");px(x+7,y+8,4,4,"#C77DFF");px(x+8,y+11,4,6,"#E8B9FF");
    }
  }
}
function drawGuy(x,y,frame){
  /* 16x24 cute pixel miner: shiny hard hat, big eyes, rosy cheeks, overalls */
  px(x+3,y,10,2,"#FFE469");             /* hat shine */
  px(x+2,y+1,12,4,"#F2C230");           /* hard hat */
  px(x+1,y+5,14,2,"#C9A616");           /* brim */
  px(x+4,y+7,8,7,"#F6D7B0");            /* face */
  px(x+5,y+9,2,3,"#FFFFFF");px(x+9,y+9,2,3,"#FFFFFF");   /* eye whites */
  px(x+6,y+10,1,2,"#20303C");px(x+10,y+10,1,2,"#20303C");/* pupils */
  px(x+4,y+12,2,1,"#F0A088");px(x+10,y+12,2,1,"#F0A088");/* rosy cheeks */
  px(x+7,y+13,2,1,"#A85A3A");           /* smile */
  px(x+3,y+14,10,6,"#3A6EC2");          /* overalls */
  px(x+5,y+14,1,3,"#F2D33C");px(x+10,y+14,1,3,"#F2D33C");/* straps */
  px(x+6,y+16,4,3,"#2A54A0");           /* pocket */
  px(x+4,y+20,3,3,"#5C3A18");px(x+9,y+20,3,3,"#5C3A18"); /* legs */
  px(x+3,y+23,4,1,"#2A1B0E");px(x+9,y+23,4,1,"#2A1B0E"); /* boots */
  /* arm + shovel */
  if(frame){
    px(x+12,y+14,5,2,"#F6D7B0");
    px(x+16,y+11,2,10,"#8A5A2B");px(x+14,y+20,6,4,"#B9C4CC");
  }else{
    px(x+12,y+16,4,2,"#F6D7B0");
    px(x+15,y+9,2,10,"#8A5A2B");px(x+13,y+5,6,4,"#B9C4CC");
  }
}
function drawSurface(w,nightBlend){
  /* sky */
  const day1=hx2rgb(w.day[0]),day2=hx2rgb(w.day[1]),n1=hx2rgb(w.night[0]),n2=hx2rgb(w.night[1]);
  const top=lerpC(day1,n1,nightBlend),bot=lerpC(day2,n2,nightBlend);
  const g=ctx.createLinearGradient(0,0,0,SURFACE);
  g.addColorStop(0,hex(top));g.addColorStop(1,hex(bot));
  ctx.fillStyle=g;ctx.fillRect(0,0,LW,SURFACE);
  /* sun / moon */
  const sb=skyBlend();
  const arc=(sb.t%(0.5))/0.5;
  const cx=20+arc*(LW-40),cy=34-Math.sin(arc*Math.PI)*22;
  if(sb.t<0.5){px(cx-5,cy-5,10,10,"#FFE47A");px(cx-3,cy-7,6,2,"#FFE47A");px(cx-3,cy+5,6,2,"#FFE47A");}
  else{px(cx-5,cy-5,10,10,"#E8ECF5");px(cx-3,cy-3,4,4,"#B9C1D4");}
  if(nightBlend>0.5){for(let i=0;i<24;i++){px((seededNoise(9,i)*LW)|0,(seededNoise(7,i)*46)|0,1,1,"rgba(255,255,255,"+(0.4+seededNoise(3,i)*0.6)+")");}}
  /* grass line */
  px(0,SURFACE-6,LW,6,w.grass);
  px(0,SURFACE-6,LW,2,"rgba(255,255,255,0.25)");
  /* buildings: refinery (red factory) */
  if(S.refLvl>0){
    px(8,SURFACE-30,30,24,"#B03030");px(8,SURFACE-30,30,3,"#7A1E1E");
    px(12,SURFACE-24,6,6,"#F2D33C");px(22,SURFACE-24,6,6,"#F2D33C");
    px(12,SURFACE-40,6,12,"#7A1E1E");
    px(13,SURFACE-46,4,4,"rgba(200,200,200,0.5)");
  }
  /* digger excavator */
  if(S.digLvl>0){
    const glow=S.generator>0&&S.genCharge>=100;
    if(glow){ctx.fillStyle="rgba(124,252,90,0.35)";ctx.fillRect(46,SURFACE-34,52,30);}
    px(50,SURFACE-22,40,10,"#F2C230");         /* body */
    px(54,SURFACE-30,16,9,"#F2C230");          /* cab */
    px(56,SURFACE-28,8,5,"#9FD9E2");           /* window */
    px(70,SURFACE-28,22,4,"#C9A616");          /* arm */
    px(88,SURFACE-26,8,10,"#8A8A8A");          /* bucket */
    px(50,SURFACE-12,40,6,"#4A4A4A");          /* tracks */
    px(52,SURFACE-10,4,3,"#222");px(60,SURFACE-10,4,3,"#222");px(68,SURFACE-10,4,3,"#222");px(76,SURFACE-10,4,3,"#222");px(84,SURFACE-10,4,3,"#222");
  }
  /* foreman guy */
  if(S.foreLvl>0){
    px(106,SURFACE-22,10,6,"#F2C9A0");px(105,SURFACE-25,12,4,"#FFF");
    px(105,SURFACE-16,12,8,"#3A6EC2");px(106,SURFACE-8,4,3,"#2A1B0E");px(112,SURFACE-8,4,3,"#2A1B0E");
  }
  /* generator */
  if(S.generator>0){
    px(126,SURFACE-24,20,18,"#5A6E7E");px(128,SURFACE-22,16,4,"#8FA9B8");
    const ch=Math.min(1,S.genCharge/100);
    px(128,SURFACE-16,(16*ch)|0,6,ch>=1?"#7CFC5A":"#F2D33C");
    px(128,SURFACE-16,16,6,"rgba(0,0,0,0)");
  }
  /* energy tap pylon */
  if(S.energyTap){
    px(158,SURFACE-30,4,24,"#8A8A9A");px(150,SURFACE-30,20,4,"#8A8A9A");
    px(152,SURFACE-26,3,6,"#C77DFF");px(165,SURFACE-26,3,6,"#C77DFF");
    const e=S.energy/1000;
    px(174,SURFACE-6-(20*e),5,(20*e)|0,"#C77DFF");
    px(174,SURFACE-26,5,20,"rgba(199,125,255,0.2)");
  }
  /* boost indicator */
  if(S.boostUntil>now()){
    ctx.fillStyle="#7CFC5A";ctx.font="bold 8px monospace";
    ctx.fillText("BOOST "+Math.ceil((S.boostUntil-now())/1000)+"s",258,10);
  }
  /* gnomes walking */
  for(const g2 of gnomes){
    px(g2.x,SURFACE-14,6,4,"#E03A3A");px(g2.x,SURFACE-10,6,4,"#F2C9A0");px(g2.x,SURFACE-6,6,4,"#3A6EC2");
  }
}
function draw(){
  const w=WORLDS[S.world];
  const sb=skyBlend();
  ctx.clearRect(0,0,LW,LH);
  drawSurface(w,sb.n);
  /* full block field, surface to bottom of screen */
  for(let r=0;r<rows.length;r++){
    const y=SURFACE+r*BS;
    if(y>=LH)break;
    for(let c=0;c<COLS;c++)drawBlock(c*BS,y,rows[r][c],w);
  }
  /* subtle depth shading near the bottom */
  for(let r=12;r<rows.length;r++){
    const y=SURFACE+r*BS;if(y>=LH)break;
    ctx.fillStyle="rgba(0,0,0,"+Math.min(0.25,(r-11)*0.03)+")";
    ctx.fillRect(0,y,LW,BS);
  }
  /* the miner stands on top of the block he is digging */
  const guyY=SURFACE+S.row*BS-24;
  const guyX=Math.max(0,Math.min(LW-20,S.col*BS+(S.dir>0?-2:6)));
  drawGuy(guyX,guyY,guyAnim>0?1:0);
  /* crack overlay on current block */
  const b=currentBlock();
  if(b&&S.tapsOnBlock>0){
    const x=S.col*BS,y=SURFACE+S.row*BS;
    ctx.strokeStyle="rgba(0,0,0,0.7)";ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(x+4,y+4);ctx.lineTo(x+11,y+11);
    if(S.tapsOnBlock>1){ctx.moveTo(x+15,y+5);ctx.lineTo(x+9,y+13);ctx.moveTo(x+6,y+16);ctx.lineTo(x+13,y+11);}
    ctx.stroke();
  }
  /* tap lord glow */
  if(S.evUntil.taplord>now()){ctx.fillStyle="rgba(242,211,60,0.06)";ctx.fillRect(0,0,LW,LH);}
  /* layer-clear flash */
  if(flashT>0){
    ctx.fillStyle="rgba(255,250,210,"+(flashT*0.55).toFixed(3)+")";
    ctx.fillRect(0,0,LW,LH);
    flashT=Math.max(0,flashT-0.04);
  }
}

/* =================== GAME LOOP =================== */
let last=performance.now();
function tick(){
  const t=performance.now();
  let dt=(t-last)/1000;last=t;
  if(dt>2)dt=2;
  if(guyAnim>0)guyAnim--;
  /* day cycle */
  const before=Math.floor(S.dayT/DAY_LEN);
  S.dayT+=dt;
  if(Math.floor(S.dayT/DAY_LEN)>before){S.stats.cycles++;bumpContract("cycles");}
  /* auto digger */
  if(S.digLvl>0){
    S._digAcc=(S._digAcc||0)+dt;
    const iv=diggerInterval();
    while(S._digAcc>=iv){
      S._digAcc-=iv;
      const n=diggerBlocks();
      for(let i=0;i<n;i++)digBlock(false,i>0);
    }
  }
  /* quarry */
  for(let i=0;i<QUARRY.length;i++){
    if(S.quarry[i]<1)continue;
    S.qTimers[i]+=dt;
    const T=quarryTime(i);
    while(S.qTimers[i]>=T){
      S.qTimers[i]-=T;
      earnDirt(QUARRY[i].amt*S.quarry[i]*quarryMult());
    }
  }
  /* generator charge */
  if(S.generator>0&&S.genCharge<100){
    S.genCharge+=dt*(100/120)*(hasR("gen")?2:1);
    if(S.genCharge>=100){S.genCharge=100;}
  }
  /* energy tap */
  if(S.energyTap)S.energy=Math.min(1000,S.energy+dt*(5/15));
  /* red set free events */
  if(redSetCount("of Digging")>=5&&(!S.evFreeAt.laser||now()>S.evFreeAt.laser)){S.evFreeAt.laser=now()+300000;fireEvent("laser");}
  if(redSetCount("of Production")>=5&&(!S.evFreeAt.hyperq||now()>S.evFreeAt.hyperq)){S.evFreeAt.hyperq=now()+300000;fireEvent("hyperq");}
  /* gnome walkers */
  for(const g2 of gnomes)g2.x+=dt*22;
  gnomes=gnomes.filter(g2=>g2.x<LW+10);
  checkWorld();checkAch();
  draw();
  requestAnimationFrame(tick);
}
setInterval(()=>{renderHud();if(panelOpen&&(screen==="quarry"||screen==="energy"||screen==="upgrades"||screen==="crates"||screen==="contracts"))renderScreen();},1000);

/* =================== OFFLINE EARNINGS =================== */
(function(){
  const away=Math.min(8*3600,(now()-(S.lastSeen||now()))/1000);
  if(away>90){
    let digMined=0,mineMade=0;
    if(S.digLvl>0)digMined=diggerBlocks()/diggerInterval()*away*blockValue()*pctMult("dig");
    for(let i=0;i<QUARRY.length;i++)if(S.quarry[i]>0)mineMade+=quarryRate(i)*away;
    if(digMined+mineMade>0){
      earnDirt(digMined+mineMade);
      setTimeout(()=>{
        toast("While you were away for "+fmtInt(away)+"s:");
        setTimeout(()=>{if(digMined>0)toast("Your digger mined "+fmt(digMined)+" Dirt!");},700);
        setTimeout(()=>{if(mineMade>0)toast("Your mines generated "+fmt(mineMade)+" Dirt!");},1400);
      },500);
    }
  }
})();

/* =================== SAVE =================== */
function save(){S.lastSeen=now();try{localStorage.setItem("dirt-inc-v2",JSON.stringify(S));}catch(e){}}
function saveMeta(){try{localStorage.setItem("dirt-inc-v2-meta",JSON.stringify(META));}catch(e){}}
setInterval(()=>{save();saveMeta();},5000);
addEventListener("pagehide",()=>{save();saveMeta();});
addEventListener("visibilitychange",()=>{if(document.hidden){save();saveMeta();}});

/* =================== INIT =================== */
if(S.energyTap)document.getElementById("tab-energy").style.display="block";
if(S.contracts.some(c=>c.done))document.getElementById("tab-menu").classList.add("glow");
renderHud();
requestAnimationFrame(tick);
if(S.stats.taps<3)setTimeout(()=>toast("Welcome to Dirt Inc! Tap the screen 3 times to dig a block of dirt."),400);
</script>
